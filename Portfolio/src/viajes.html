<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIAJES</title>
    <style>
        body{
            background-color:darkkhaki;
            background-size: cover;
            color:black;
            padding: 50px 20px;
        }   
        .viajes .contenido-seccion{
            max-width: 1100px;
            margin: auto; 
        } 
        .viajes h2{
            font-size: 48px;
            font-family: 'Righteous';
            text-align: center;
            padding: 20px 0;
        }
        .viajes .galeria{
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }
        .viajes .galeria .viaje{
            position: relative;
            max-width: 340px;
            height: fit-content;
            margin: 10px;
            cursor: pointer; 
        }
        .viajes .galeria .viaje img{
            width: 100%;
            display: block;
        }
        .viajes .galeria .viaje .overlay{
            position: absolute;
            top:0;
            width: 100%;
            height: 100%;
            text-align: center;
            background: linear-gradient(rgba(215, 250, 135, 0.575),rgba(215, 250, 135, 0.575));
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: 1s;
            font-size: 18px;
            letter-spacing:3px;
            opacity: 0;
        }
        .viajes .galeria .viaje .overlay h3{
            margin-bottom: 20px;
            transition: 1s;
        }
        .viajes .galeria .viaje .overlay:hover{
            opacity: 1;
        } 
        .viajes .galeria .viaje .overlay:hover h3{
            margin-bottom: 0px;
        } 
    </style>
</head>
<body>
    <section id="viajes" class="viajes">
        <div class="contenido-seccion">
            <h2>LUGARES QUE ME GUSTARÍA VISITAR</h2>
            <div class="galeria">
                <div class="viaje">
                    <img src="../img/nyc.jpg" alt="NYC ">
                    <div class="overlay">
                        <h3>NYC</h3>
                    </div>
                </div>
                <div class="viaje">
                    <img src="../img/milan.jpg" alt="MILAN">
                    <div class="overlay">
                        <h3>MILAN</h3>
                    </div>
                </div>
                <div class="viaje">
                    <img src="../img/marrakech.jpg" alt="MARRAKECH ">
                    <div class="overlay">
                        <h3>MARRACHECH </h3>
                    </div>
                </div>
                <div class="viaje">
                    <img src="../img/praga.jpg" alt="PRAGA">
                    <div class="overlay">
                        <h3>PRAGA</h3>
                    </div>
                </div>
                <div class="viaje">
                    <img src="../img/bali.jpg" alt="BALI">
                    <div class="overlay">
                        <h3>BALI</h3>
                    </div>
                </div>
                <div class="viaje">
                    <img src="../img/berlin.jpg" alt="BERLIN">
                    <div class="overlay">
                        <h3>BERLIN</h3>
                    </div>
                </div>

            </div>
        </div>
    </section>
</body>
</html>
