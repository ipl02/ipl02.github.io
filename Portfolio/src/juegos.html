<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUEGOS</title>
    <style>
        body{
            background-color:lightsalmon;
            background-size: cover;
            color:black;
            padding: 50px 20px;
        }   
        .juegos .contenido-seccion{
            max-width: 1100px;
            margin: auto; 
        } 
        .juegos h2{
            font-size: 48px;
            font-family: 'Righteous';
            text-align: center;
            padding: 20px 0;
        }
        .juegos .galeria{
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }
        .juegos .galeria .juego{
            position: relative;
            max-width: 340px;
            height: fit-content;
            margin: 10px;
            cursor: pointer; 
        }
        .juegos .galeria .juego img{
            width: 100%;
            display: block;
        }
        .juegos .galeria .juego .overlay{
            position: absolute;
            top:0;
            width: 100%;
            height: 100%;
            text-align: center;
            background: linear-gradient(rgba(250, 187, 135, 0.575),rgba(250, 187, 135, 0.575));
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: 1s;
            font-size: 18px;
            letter-spacing:3px;
            opacity: 0;
        }
        .juegos .galeria .juego .overlay h3{
            margin-bottom: 20px;
            transition: 1s;
        }
        .juegos .galeria .juego .overlay:hover{
            opacity: 1;
        } 
        .juegos .galeria .juego .overlay:hover h3{
            margin-bottom: 0px;
        } 
    </style>
</head>
<body>
    <section id="juegos" class="juegos">
        <div class="contenido-seccion">
            <h2>JUEGOS</h2>
            <div class="galeria">
                <div class="juego">
                    <img src="../img/animal_crossing.jpg" alt="Animal Crossing">
                    <div class="overlay">
                        <h3>Animal Crossing</h3>
                    </div>
                </div>
                <div class="juego">
                    <img src="../img/fornite.png" alt="Fornite">
                    <div class="overlay">
                        <h3>Fornite</h3>
                    </div>
                </div>
                <div class="juego">
                    <img src="../img/mario_kart.jpg" alt="Mario kart">
                    <div class="overlay">
                        <h3>Mario kart </h3>
                    </div>
                </div>
                <div class="juego">
                    <img src="../img/mario3d.jpg" alt="Super Mario 3D Land">
                    <div class="overlay">
                        <h3>Super Mario 3D Land</h3>
                    </div>
                </div>
                <div class="juego">
                    <img src="../img/sims.jpg" alt="LOS SIMS">
                    <div class="overlay">
                        <h3>LOS SIMS</h3>
                    </div>
                </div>
                <div class="juego">
                    <img src="../img/nintendogs.jpg" alt="NINTENDOGS">
                    <div class="overlay">
                        <h3>NINTENDOGS</h3>
                    </div>
                </div>

            </div>
        </div>
    </section>
</body>
</html>
